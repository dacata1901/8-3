<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f2f2f2;
}

/* khung banner */
.banner{
    width:100%;
    height:100px;
    background:rgb(249, 151, 177);
    overflow:hidden;
    position:relative;
}

/* chữ chạy */
.text{
    position:absolute;
    white-space:nowrap;
    font-size:35px;
    color:white;
    font-weight:bold;
    left:100%;
}

</style>
</head>

<body>

<div class="banner">
    <div class="text" id="text">MILO Dầm iiiiiii</div>
</div>

<script>

let text = document.getElementById("text");
let position = window.innerWidth;

function run(){
    position -= 2;

    if(position < -text.offsetWidth){
        position = window.innerWidth;
    }

    text.style.left = position + "px";
}

setInterval(run,20);

</script>

</body>
</html>
